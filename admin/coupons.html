<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Coupons - Admin</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-logo">Admin Panel</div>
      <nav class="admin-nav">
        <a href="index.html">Dashboard</a>
        <a href="products.html">Products</a>
        <a href="orders.html">Orders</a>
        <a href="coupons.html" class="active">Coupons</a>
        <a href="settings.html">Settings</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h1 style="font-size: 1.25rem; margin: 0;">Coupons</h1>
        <button id="add-coupon-btn" class="btn btn-primary btn-sm">+ Add Coupon</button>
      </header>

      <div class="admin-content">
        <div class="table-container">
          <table style="width: 100%;">
            <thead>
              <tr>
                <th>Code</th>
                <th>Discount</th>
                <th>Min Order</th>
                <th>Uses</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="coupons-tbody">
              <tr><td colspan="5">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { initAuth } from '../js/auth.js';
    import { checkAdmin } from '../js/admin.js';
    import { supabase } from '../js/supabase.js';

    async function init() {
      await initAuth();
      await checkAdmin();
      loadCoupons();
      // Logic for adding/editing coupons would go here (similar to products)
    }

    async function loadCoupons() {
      const { data } = await supabase.from('coupons').select('*').order('created_at', { ascending: false });
      const tbody = document.getElementById('coupons-tbody');
      
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5">No coupons found.</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(c => `
        <tr>
          <td class="fw-bold">${c.code}</td>
          <td>${c.discount_type === 'percent' ? c.discount_value + '%' : '₹' + c.discount_value}</td>
          <td>₹${c.min_order}</td>
          <td>${c.used_count} ${c.max_uses ? `/ ${c.max_uses}` : ''}</td>
          <td><span class="badge-stock ${c.is_active ? 'in-stock' : 'out-of-stock'}">${c.is_active ? 'Active' : 'Inactive'}</span></td>
        </tr>
      `).join('');
    }

    init();
  </script>
</body>
</html>
