<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My Account - My Store</title>
  <link rel="stylesheet" href="./css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .account-layout { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
    @media (min-width: 768px) { .account-layout { grid-template-columns: 220px 1fr; gap: 2rem; } }
    .account-nav { background: white; border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 0.75rem; height: fit-content; display: flex; gap: 0.5rem; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .account-nav::-webkit-scrollbar { display: none; }
    @media (min-width: 768px) { .account-nav { flex-direction: column; position: sticky; top: 5rem; padding: 1rem; overflow-x: visible; } }
    .account-nav-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 0.85rem; border-radius: var(--radius-md); font-size: 0.85rem; font-weight: 500; color: var(--color-text-muted); cursor: pointer; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
    @media (min-width: 768px) { .account-nav-item { width: 100%; text-align: left; font-size: 0.9rem; padding: 0.7rem 1rem; } }
    .account-nav-item:hover { background: var(--color-bg-secondary); color: var(--color-text); }
    .account-nav-item.active { background: var(--color-accent); color: white; }
    .panel { display: none; } .panel.active { display: block; }
    .order-card { border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
    .order-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .address-card { border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 1.25rem; position: relative; }
    .address-card.default { border-color: var(--color-accent); }
    .empty-state { text-align: center; padding: 3rem 1rem; }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    .addr-form-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    @media (min-width: 480px) { .addr-form-grid { grid-template-columns: 1fr 1fr; } }
    .addr-form-grid-3 { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    @media (min-width: 480px) { .addr-form-grid-3 { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 768px) { .addr-form-grid-3 { grid-template-columns: 1fr 1fr 1fr; } }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="container section">
    <div class="account-layout">
      <!-- Sidebar Nav -->
      <nav class="account-nav">
        <button class="account-nav-item active" data-panel="orders">📦 My Orders</button>
        <button class="account-nav-item" data-panel="wishlist">❤️ Wishlist</button>
        <button class="account-nav-item" data-panel="addresses">📍 Addresses</button>
        <button class="account-nav-item" data-panel="profile">👤 Profile</button>
        <button class="account-nav-item" id="logout-btn" style="margin-top:1rem;color:var(--color-danger);">🚪 Logout</button>
      </nav>

      <!-- Panels -->
      <div>
        <!-- Orders Panel -->
        <div class="panel active" id="panel-orders">
          <h2 style="margin-bottom:1.5rem;">My Orders</h2>
          <div id="orders-list"><p class="text-muted">Loading orders...</p></div>
        </div>

        <!-- Wishlist Panel -->
        <div class="panel" id="panel-wishlist">
          <h2 style="margin-bottom:1.5rem;">My Wishlist</h2>
          <div id="wishlist-grid" class="product-grid"></div>
        </div>

        <!-- Addresses Panel -->
        <div class="panel" id="panel-addresses">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
            <h2>My Addresses</h2>
            <button class="btn btn-primary btn-sm" id="add-address-btn">+ Add Address</button>
          </div>
          <div id="addresses-list"></div>
          <form id="address-form" style="display:none;background:var(--color-bg-secondary);border-radius:var(--radius-lg);padding:1.25rem;margin-top:1rem;">
            <h3 style="margin-bottom:1rem; font-size: 1rem;">New Address</h3>
            <div class="addr-form-grid">
              <div class="form-group"><label class="form-label">Full Name</label><input class="form-control" id="addr-name" required></div>
              <div class="form-group"><label class="form-label">Phone</label><input class="form-control" id="addr-phone" required></div>
            </div>
            <div class="form-group"><label class="form-label">Address Line 1</label><input class="form-control" id="addr-line1" required></div>
            <div class="form-group"><label class="form-label">Address Line 2 (Optional)</label><input class="form-control" id="addr-line2"></div>
            <div class="addr-form-grid-3">
              <div class="form-group"><label class="form-label">City</label><input class="form-control" id="addr-city" required></div>
              <div class="form-group"><label class="form-label">State</label><input class="form-control" id="addr-state" required></div>
              <div class="form-group"><label class="form-label">Pincode</label><input class="form-control" id="addr-pincode" required></div>
            </div>
            <div style="display:flex;gap:1rem;flex-wrap:wrap;">
              <button type="submit" class="btn btn-primary">Save Address</button>
              <button type="button" class="btn btn-outline" id="cancel-address-btn">Cancel</button>
            </div>
          </form>
        </div>

        <!-- Profile Panel -->
        <div class="panel" id="panel-profile">
          <h2 style="margin-bottom:1.5rem;">My Profile</h2>
          <form id="profile-form" style="max-width:480px;">
            <div class="form-group"><label class="form-label">Full Name</label><input type="text" id="profile-name" class="form-control"></div>
            <div class="form-group"><label class="form-label">Email</label><input type="email" id="profile-email" class="form-control" disabled style="opacity:0.6;"></div>
            <div class="form-group"><label class="form-label">Phone</label><input type="tel" id="profile-phone" class="form-control" placeholder="+91 00000 00000"></div>
            <button type="submit" class="btn btn-primary" id="save-profile-btn">Save Changes</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module">
    import { HEADER_HTML, FOOTER_HTML, BOTTOM_NAV_HTML, initPage } from './js/header.js';
    import { logout, requireAuth } from './js/auth.js';
    import { supabase } from './js/supabase.js';
    import { showToast } from './js/toast.js';
    import { fetchProducts, renderProductCards } from './js/products.js';

    document.getElementById('header-placeholder').innerHTML = HEADER_HTML;
    document.getElementById('footer-placeholder').innerHTML = FOOTER_HTML;
    document.body.insertAdjacentHTML('beforeend', BOTTOM_NAV_HTML);

    async function init() {
      const { user, profile } = await initPage();
      if (!user) { window.location.href = './login.html?returnUrl=./account.html'; return; }

      // Tab navigation
      document.querySelectorAll('.account-nav-item[data-panel]').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.account-nav-item').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
        });
      });

      // Hash routing
      const hash = window.location.hash.replace('#', '');
      if (hash) {
        const btn = document.querySelector(`[data-panel="${hash}"]`);
        if (btn) btn.click();
      }

      document.getElementById('logout-btn').addEventListener('click', () => logout());

      // Load profile data
      if (profile) {
        document.getElementById('profile-name').value = profile.full_name || '';
        document.getElementById('profile-phone').value = profile.phone || '';
      }
      const { data: { user: authUser } } = await supabase.auth.getUser();
      if (authUser) document.getElementById('profile-email').value = authUser.email || '';

      document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('save-profile-btn');
        btn.disabled = true; btn.textContent = 'Saving...';
        const { error } = await supabase.from('profiles').update({
          full_name: document.getElementById('profile-name').value,
          phone: document.getElementById('profile-phone').value
        }).eq('id', user.id);
        btn.disabled = false; btn.textContent = 'Save Changes';
        if (error) showToast('Error saving profile', 'error');
        else showToast('Profile updated!', 'success');
      });

      // Orders
      const { data: orders } = await supabase.from('orders').select(`*, order_items(*, products(name))`).eq('user_id', user.id).order('created_at', { ascending: false });
      const ordersEl = document.getElementById('orders-list');
      if (!orders || orders.length === 0) {
        ordersEl.innerHTML = `<div class="empty-state"><div class="icon">📦</div><h3>No orders yet</h3><p class="text-muted mb-4">Your orders will appear here</p><a href="./shop.html" class="btn btn-primary">Start Shopping</a></div>`;
      } else {
        ordersEl.innerHTML = orders.map(o => `
          <div class="order-card">
            <div class="order-header">
              <div><div style="font-weight:600;font-size:0.85rem;color:var(--color-text-muted);">ORDER #${o.id.substring(0,8).toUpperCase()}</div>
              <div style="font-size:0.8rem;color:var(--color-text-muted);">${new Date(o.created_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</div></div>
              <span class="status-badge status-${o.status}">${o.status.charAt(0).toUpperCase() + o.status.slice(1)}</span>
            </div>
            <div style="font-size:0.85rem;color:var(--color-text-muted);margin-bottom:0.5rem;">${o.order_items?.length || 0} item(s)</div>
            <div style="font-weight:700;font-size:1.1rem;">₹${parseFloat(o.total).toLocaleString('en-IN')}</div>
          </div>
        `).join('');
      }

      // Wishlist
      const { data: wl } = await supabase.from('wishlist').select('product_id, products(*, product_media(url, sort_order))').eq('user_id', user.id);
      const wlGrid = document.getElementById('wishlist-grid');
      if (!wl || wl.length === 0) {
        wlGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">❤️</div><h3>Wishlist is empty</h3><p class="text-muted mb-4">Save items you love for later</p><a href="./shop.html" class="btn btn-primary">Browse Products</a></div>`;
      } else {
        const prods = wl.map(w => { const p = w.products; if (!p) return null; p.main_image_url = p.product_media?.sort((a,b)=>a.sort_order-b.sort_order)[0]?.url || 'https://placehold.co/400x500?text=No+Image'; p.hover_image_url = p.main_image_url; return p; }).filter(Boolean);
        renderProductCards(prods, 'wishlist-grid');
      }

      // Addresses
      async function loadAddresses() {
        const { data: addrs } = await supabase.from('addresses').select('*').eq('user_id', user.id).order('is_default', { ascending: false });
        const el = document.getElementById('addresses-list');
        if (!addrs || addrs.length === 0) {
          el.innerHTML = `<p class="text-muted">No saved addresses. Add one below.</p>`;
          return;
        }
        el.innerHTML = addrs.map(a => `
          <div class="address-card ${a.is_default ? 'default' : ''}" style="margin-bottom:1rem;">
            ${a.is_default ? '<span style="font-size:0.72rem;color:var(--color-accent);font-weight:600;">DEFAULT</span>' : ''}
            <div style="font-weight:600;">${a.name}</div>
            <div class="text-muted" style="font-size:0.875rem;">${a.line1}${a.line2 ? ', ' + a.line2 : ''}, ${a.city}, ${a.state} - ${a.pincode}</div>
            <div class="text-muted" style="font-size:0.875rem;">📞 ${a.phone}</div>
            <div style="margin-top:0.75rem;display:flex;gap:0.5rem;">
              ${!a.is_default ? `<button class="btn btn-outline btn-sm" onclick="setDefault('${a.id}')">Set Default</button>` : ''}
              <button class="btn btn-outline btn-sm" onclick="deleteAddr('${a.id}')" style="color:var(--color-danger);">Delete</button>
            </div>
          </div>
        `).join('');
      }

      window.setDefault = async (id) => {
        await supabase.from('addresses').update({ is_default: false }).eq('user_id', user.id);
        await supabase.from('addresses').update({ is_default: true }).eq('id', id);
        loadAddresses(); showToast('Default address updated', 'success');
      };
      window.deleteAddr = async (id) => {
        await supabase.from('addresses').delete().eq('id', id);
        loadAddresses(); showToast('Address removed', 'info');
      };

      document.getElementById('add-address-btn').addEventListener('click', () => {
        document.getElementById('address-form').style.display = 'block';
      });
      document.getElementById('cancel-address-btn').addEventListener('click', () => {
        document.getElementById('address-form').style.display = 'none';
      });
      document.getElementById('address-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const { error } = await supabase.from('addresses').insert({
          user_id: user.id,
          name: document.getElementById('addr-name').value,
          phone: document.getElementById('addr-phone').value,
          line1: document.getElementById('addr-line1').value,
          line2: document.getElementById('addr-line2').value,
          city: document.getElementById('addr-city').value,
          state: document.getElementById('addr-state').value,
          pincode: document.getElementById('addr-pincode').value,
          is_default: false
        });
        if (error) { showToast('Error saving address', 'error'); return; }
        document.getElementById('address-form').reset();
        document.getElementById('address-form').style.display = 'none';
        showToast('Address saved!', 'success');
        loadAddresses();
      });

      loadAddresses();
    }

    init();
  </script>
</body>
</html>
