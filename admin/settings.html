<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings - Admin</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-logo">Admin Panel</div>
      <nav class="admin-nav">
        <a href="index.html">Dashboard</a>
        <a href="products.html">Products</a>
        <a href="orders.html">Orders</a>
        <a href="coupons.html">Coupons</a>
        <a href="reviews.html">Reviews</a>
        <a href="blog.html">Blog</a>
        <a href="settings.html" class="active">Settings</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h1 style="font-size: 1.25rem; margin: 0;">Store Settings</h1>
      </header>

      <div class="admin-content" style="max-width: 900px;">
        <form id="settings-form">
          <div class="product-card" style="padding: 2rem; margin-bottom: 2rem;">
            <div class="admin-section-title mt-0">General Info</div>
            
            <div class="d-flex gap-4 mb-4">
              <div class="form-group" style="flex:2;">
                <label class="form-label">Store Name</label>
                <input type="text" id="set-store_name" class="form-control" data-key="store_name">
              </div>
              <div class="form-group" style="flex:3;">
                <label class="form-label">Store Tagline</label>
                <input type="text" id="set-store_tagline" class="form-control" data-key="store_tagline">
              </div>
            </div>

            <div class="form-group mb-4 pb-4" style="border-bottom: 1px solid var(--color-border);">
              <label class="form-label">Store Logo</label>
              <div class="d-flex align-center gap-4">
                <button type="button" class="btn btn-outline btn-sm" id="upload-logo-btn">Upload Logo</button>
                <input type="hidden" id="set-logo_url" data-key="logo_url">
                <div style="width:120px; height:60px; background:var(--color-bg-secondary); border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; border:1px solid var(--color-border);">
                  <img id="logo-preview" src="" style="max-width:100%; max-height:100%; display:none;">
                  <span id="logo-none" class="text-sm text-muted">No Logo</span>
                </div>
                <button type="button" class="btn btn-danger btn-sm" id="remove-logo-btn" style="display:none;">Remove</button>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">WhatsApp Number</label>
              <input type="text" id="set-whatsapp_number" class="form-control" data-key="whatsapp_number" placeholder="919876543210 (Country code, no +)">
            </div>
          </div>

          <div class="product-card" style="padding: 2rem; margin-bottom: 2rem;">
            <div class="admin-section-title mt-0">Social Media Links</div>
            <div class="d-flex gap-4">
              <div class="form-group" style="flex:1;">
                <label class="form-label">Instagram URL</label>
                <input type="url" id="set-social_instagram" class="form-control" data-key="social_instagram" placeholder="https://instagram.com/...">
              </div>
              <div class="form-group" style="flex:1;">
                <label class="form-label">Facebook URL</label>
                <input type="url" id="set-social_facebook" class="form-control" data-key="social_facebook" placeholder="https://facebook.com/...">
              </div>
              <div class="form-group" style="flex:1;">
                <label class="form-label">Twitter/X URL</label>
                <input type="url" id="set-social_twitter" class="form-control" data-key="social_twitter" placeholder="https://x.com/...">
              </div>
            </div>
          </div>

          <div class="product-card" style="padding: 2rem; margin-bottom: 2rem;">
            <div class="admin-section-title mt-0 d-flex justify-between align-center">
              <span>Hero Banner Slides</span>
              <button type="button" class="btn btn-outline btn-sm" id="add-slide-btn">+ Add Slide</button>
            </div>
            <p class="text-muted text-sm mb-4">Upload images for the homepage slider. Add optional links.</p>
            <div id="slides-container" class="d-flex flex-column gap-3"></div>
          </div>

          <div class="product-card" style="padding: 2rem; margin-bottom: 2rem;">
            <div class="admin-section-title mt-0">Shipping & Return Rules</div>
            <div class="d-flex gap-4 mb-4">
              <div class="form-group" style="flex:1;">
                <label class="form-label">Free Shipping Threshold (₹)</label>
                <input type="number" id="set-free_shipping_threshold" class="form-control" data-key="free_shipping_threshold">
              </div>
              <div class="form-group" style="flex:1;">
                <label class="form-label">Flat Shipping Charge (₹)</label>
                <input type="number" id="set-flat_shipping_charge" class="form-control" data-key="flat_shipping_charge">
              </div>
            </div>
            <div class="form-group mb-4">
              <label class="form-label">Global Shipping Policy (Markdown)</label>
              <textarea id="set-global_shipping_policy" class="form-control" rows="3" data-key="global_shipping_policy"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Global Return Policy (Markdown)</label>
              <textarea id="set-global_return_policy" class="form-control" rows="3" data-key="global_return_policy"></textarea>
            </div>
          </div>

          <div style="position:sticky; bottom:0; padding:1.5rem 0; background:var(--color-bg-secondary); border-top:1px solid var(--color-border); z-index:10;" class="d-flex justify-end">
            <button type="submit" class="btn btn-primary btn-block" style="max-width:300px;" id="save-settings-btn">Save All Settings</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script type="module">
    import { initAuth } from '../js/auth.js';
    import { checkAdmin } from '../js/admin.js';
    import { supabase } from '../js/supabase.js';
    import { showToast } from '../js/toast.js';
    import { openUploadWidget } from '../js/cloudinary.js';

    let heroSlides = [];

    async function init() {
      await initAuth();
      await checkAdmin();
      await loadSettings();

      // Logo Upload
      document.getElementById('upload-logo-btn').addEventListener('click', () => {
        openUploadWidget({ maxFiles: 1 }, (res) => {
          document.getElementById('set-logo_url').value = res.url;
          document.getElementById('logo-preview').src = res.url;
          document.getElementById('logo-preview').style.display = 'block';
          document.getElementById('logo-none').style.display = 'none';
          document.getElementById('remove-logo-btn').style.display = 'inline-block';
        });
      });

      document.getElementById('remove-logo-btn').addEventListener('click', () => {
        document.getElementById('set-logo_url').value = '';
        document.getElementById('logo-preview').style.display = 'none';
        document.getElementById('logo-none').style.display = 'block';
        document.getElementById('remove-logo-btn').style.display = 'none';
      });

      // Hero Slides
      document.getElementById('add-slide-btn').addEventListener('click', () => {
        openUploadWidget({}, (res) => {
          heroSlides.push({ image_url: res.url, link_url: '' });
          renderSlides();
        });
      });

      // Submit
      document.getElementById('settings-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('save-settings-btn');
        btn.disabled = true;
        btn.textContent = 'Saving Settings...';

        const inputs = document.querySelectorAll('#settings-form [data-key]');
        const updates = Array.from(inputs).map(input => ({
          key: input.getAttribute('data-key'),
          value: input.value
        }));

        // Add slides JSON string
        updates.push({
          key: 'hero_slides',
          value: JSON.stringify(heroSlides)
        });

        try {
          const { error } = await supabase.from('settings').upsert(updates);
          if (error) throw error;
          showToast('Settings saved successfully', 'success');
        } catch (error) {
          showToast(error.message, 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Save All Settings';
        }
      });
    }

    async function loadSettings() {
      const { data } = await supabase.from('settings').select('*');
      if (data) {
        data.forEach(row => {
          if (row.key === 'hero_slides') {
            try { heroSlides = JSON.parse(row.value) || []; } catch(e){ heroSlides = []; }
            renderSlides();
          } else {
            const el = document.getElementById(`set-${row.key}`);
            if (el) el.value = row.value || '';
            
            // Special handling for logo
            if (row.key === 'logo_url' && row.value) {
              document.getElementById('logo-preview').src = row.value;
              document.getElementById('logo-preview').style.display = 'block';
              document.getElementById('logo-none').style.display = 'none';
              document.getElementById('remove-logo-btn').style.display = 'inline-block';
            }
          }
        });
      }
    }

    function renderSlides() {
      const c = document.getElementById('slides-container');
      if (heroSlides.length === 0) {
        c.innerHTML = '<div class="text-muted text-center" style="padding:2rem; border:1px dashed var(--color-border); border-radius:var(--radius-md);">No slides added yet.</div>';
        return;
      }

      c.innerHTML = heroSlides.map((slide, i) => `
        <div class="d-flex gap-4 align-center" style="border:1px solid var(--color-border); padding:1rem; border-radius:var(--radius-md); background:white;">
          <img src="${slide.image_url}" style="width:120px; height:60px; object-fit:cover; border-radius:var(--radius-sm); border:1px solid var(--color-border);">
          <div style="flex:1;">
            <input type="text" class="form-control" placeholder="Optional Link URL (e.g. /shop.html?category=electronics)" value="${slide.link_url}" oninput="heroSlides[${i}].link_url=this.value">
          </div>
          <div class="d-flex flex-column gap-2">
            <button type="button" class="btn btn-outline btn-sm" onclick="window.moveSlideUp(${i})" ${i === 0 ? 'disabled' : ''}>↑</button>
            <button type="button" class="btn btn-outline btn-sm" onclick="window.moveSlideDown(${i})" ${i === heroSlides.length - 1 ? 'disabled' : ''}>↓</button>
          </div>
          <button type="button" class="btn btn-danger" onclick="window.removeSlide(${i})">Remove</button>
        </div>
      `).join('');
    }

    window.moveSlideUp = (idx) => {
      if(idx === 0) return;
      const temp = heroSlides[idx - 1];
      heroSlides[idx - 1] = heroSlides[idx];
      heroSlides[idx] = temp;
      renderSlides();
    };

    window.moveSlideDown = (idx) => {
      if(idx === heroSlides.length - 1) return;
      const temp = heroSlides[idx + 1];
      heroSlides[idx + 1] = heroSlides[idx];
      heroSlides[idx] = temp;
      renderSlides();
    };

    window.removeSlide = (idx) => {
      heroSlides.splice(idx, 1);
      renderSlides();
    };

    init();
  </script>
</body>
</html>
