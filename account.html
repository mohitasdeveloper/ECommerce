<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My Account - My Store</title>
  <link rel="stylesheet" href="./css/main.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
  <style>
    /* Account layout */
    .account-layout { display: flex; flex-direction: column; gap: 0; }
    @media (min-width: 768px) { .account-layout { display: grid; grid-template-columns: 260px 1fr; gap: 2rem; } }

    /* Sidebar */
    .account-sidebar { background: white; border-bottom: 1px solid var(--color-border); padding: 0; }
    @media (min-width: 768px) { .account-sidebar { border: 1px solid var(--color-border); border-radius: var(--radius-lg); position: sticky; top: 5rem; height: fit-content; padding: 1.5rem; border-bottom: none; } }

    /* Profile card at top of sidebar */
    .profile-card { display: flex; align-items: center; gap: 1rem; padding: 1rem; }
    @media (min-width: 768px) { .profile-card { flex-direction: column; text-align: center; padding: 0 0 1.5rem; border-bottom: 1px solid var(--color-border); margin-bottom: 1rem; } }
    
    .avatar-wrap { position: relative; flex-shrink: 0; }
    .avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 3px solid var(--color-bg-secondary); background: var(--color-bg-secondary); }
    @media (min-width: 768px) { .avatar { width: 80px; height: 80px; } }
    .avatar-edit-btn { position: absolute; bottom: -2px; right: -2px; width: 24px; height: 24px; border-radius: 50%; background: var(--color-accent); color: white; display: flex; align-items: center; justify-content: center; border: 2px solid white; cursor: pointer; transition: transform 0.2s; }
    .avatar-edit-btn:hover { transform: scale(1.1); }
    .avatar-edit-btn svg { width: 12px; height: 12px; }

    .profile-info { min-width: 0; }
    .profile-name { font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .profile-email { font-size: 0.8rem; color: var(--color-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Tabs - horizontal scroll on mobile */
    .account-tabs { display: flex; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; border-bottom: 1px solid var(--color-border); background: white; }
    .account-tabs::-webkit-scrollbar { display: none; }
    @media (min-width: 768px) { .account-tabs { flex-direction: column; border-bottom: none; overflow-x: visible; gap: 0.25rem; } }

    .tab-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.85rem 1.15rem; font-size: 0.82rem; font-weight: 600; color: var(--color-text-muted); white-space: nowrap; cursor: pointer; border-bottom: 2px solid transparent; flex-shrink: 0; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
    .tab-item:hover { color: var(--color-text); }
    .tab-item.active { color: var(--color-accent); border-bottom-color: var(--color-accent); }
    @media (min-width: 768px) {
      .tab-item { border-bottom: none; border-radius: var(--radius-md); padding: 0.7rem 1rem; font-size: 0.9rem; }
      .tab-item.active { background: rgba(37,99,235,0.08); border-bottom: none; }
      .tab-item:hover { background: var(--color-bg-secondary); }
    }
    .tab-icon { font-size: 1.1rem; line-height: 1; }

    /* Content panels */
    .panel { display: none; }
    .panel.active { display: block; }
    .account-content { padding: 1.25rem 0; }
    @media (min-width: 768px) { .account-content { padding: 0; } }

    /* Order cards */
    .order-card { border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 0.85rem; transition: box-shadow 0.2s; background: white; }
    .order-card:hover { box-shadow: var(--shadow-sm); }
    .order-summary-row { padding: 1rem 1.1rem; display: flex; align-items: center; gap: 0.75rem; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .order-summary-row:hover { background: var(--color-bg-secondary); }
    .order-meta { font-size: 0.78rem; color: var(--color-text-muted); }
    .order-toggle-icon { margin-left: auto; color: var(--color-text-muted); transition: transform 0.25s; flex-shrink: 0; }
    .order-card.expanded .order-toggle-icon { transform: rotate(180deg); }
    /* Expandable body */
    .order-body { display: none; border-top: 1px solid var(--color-border); }
    .order-card.expanded .order-body { display: block; }
    .order-body-inner { padding: 1.1rem; }
    /* Status timeline */
    .order-timeline { display: flex; align-items: center; gap: 0; margin-bottom: 1.25rem; overflow-x: auto; padding-bottom: 0.25rem; }
    .timeline-step { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 60px; }
    .timeline-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--color-border); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: white; font-weight: 700; flex-shrink: 0; }
    .timeline-dot.done { background: var(--color-success); }
    .timeline-dot.active { background: var(--color-accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.18); }
    .timeline-dot.cancelled { background: var(--color-danger); }
    .timeline-label { font-size: 0.68rem; color: var(--color-text-muted); margin-top: 0.3rem; text-align: center; white-space: nowrap; }
    .timeline-label.active { color: var(--color-accent); font-weight: 600; }
    .timeline-label.done { color: var(--color-success); }
    .timeline-line { flex: 1; height: 2px; background: var(--color-border); min-width: 20px; }
    .timeline-line.done { background: var(--color-success); }
    /* Order items list */
    .order-item-row { display: flex; gap: 0.85rem; align-items: flex-start; padding: 0.75rem 0; border-bottom: 1px solid var(--color-border); }
    .order-item-row:last-child { border-bottom: none; }
    .order-item-img { width: 52px; height: 52px; border-radius: var(--radius-md); object-fit: cover; flex-shrink: 0; background: var(--color-bg-secondary); }
    /* Payment breakdown */
    .pay-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.4rem; }
    /* Track button */
    .track-btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.45rem 1rem; border-radius: var(--radius-full); background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; font-size: 0.82rem; font-weight: 600; text-decoration: none; transition: all 0.2s; }
    .track-btn:hover { background: #16a34a; color: white; }

    /* Address cards */
    .addresses-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; }
    @media (min-width: 640px) { .addresses-grid { grid-template-columns: 1fr 1fr; } }
    .address-card { border: 1.5px solid var(--color-border); border-radius: var(--radius-lg); padding: 1rem; position: relative; transition: all 0.2s; }
    .address-card.default { border-color: var(--color-accent); background: rgba(37,99,235,0.02); }

    /* Form grids */
    .form-grid-2 { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    @media (min-width: 480px) { .form-grid-2 { grid-template-columns: 1fr 1fr; } }
    .form-grid-3 { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    @media (min-width: 480px) { .form-grid-3 { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 768px) { .form-grid-3 { grid-template-columns: 1fr 1fr 1fr; } }

    /* Empty states */
    .empty-state { text-align: center; padding: 3rem 1rem; }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

    /* Logout mobile */
    .logout-row { padding: 1rem; border-top: 1px solid var(--color-border); }
    @media (min-width: 768px) { .logout-row { padding: 1rem 0; margin-top: 0.5rem; } }

    /* Panel header */
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.75rem; }
    .panel-title { font-size: 1.2rem; font-weight: 700; }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="container section">
    <div class="account-layout">
      <!-- Sidebar -->
      <aside class="account-sidebar">
        <div class="profile-card">
          <div class="avatar-wrap">
            <img id="user-avatar" class="avatar" src="https://ui-avatars.com/api/?name=User&background=e5e7eb&color=6b7280&size=160&font-size=0.4" alt="Avatar">
            <button class="avatar-edit-btn" id="change-avatar-btn" title="Change photo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </button>
          </div>
          <div class="profile-info">
            <div class="profile-name" id="sidebar-name">Loading...</div>
            <div class="profile-email" id="sidebar-email"></div>
          </div>
        </div>
        <nav class="account-tabs" id="account-tabs">
          <button class="tab-item active" data-panel="orders"><span class="tab-icon">📦</span> Orders</button>
          <button class="tab-item" data-panel="wishlist"><span class="tab-icon">❤️</span> Wishlist</button>
          <button class="tab-item" data-panel="addresses"><span class="tab-icon">📍</span> Addresses</button>
          <button class="tab-item" data-panel="profile"><span class="tab-icon">👤</span> Profile</button>
        </nav>
        <div class="logout-row">
          <button class="btn btn-outline btn-sm btn-block" id="logout-btn" style="color:var(--color-danger); border-color: var(--color-danger);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
          </button>
        </div>
      </aside>

      <!-- Panels -->
      <div class="account-content">
        <!-- Orders Panel -->
        <div class="panel active" id="panel-orders">
          <div class="panel-header">
            <h2 class="panel-title">My Orders</h2>
          </div>
          <div id="orders-list"><p class="text-muted">Loading orders...</p></div>
        </div>

        <!-- Wishlist Panel -->
        <div class="panel" id="panel-wishlist">
          <div class="panel-header">
            <h2 class="panel-title">My Wishlist</h2>
          </div>
          <div id="wishlist-grid" class="product-grid"></div>
        </div>

        <!-- Addresses Panel -->
        <div class="panel" id="panel-addresses">
          <div class="panel-header">
            <h2 class="panel-title">My Addresses</h2>
            <button class="btn btn-primary btn-sm" id="add-address-btn">+ Add Address</button>
          </div>
          <div id="addresses-list" class="addresses-grid"></div>
          <form id="address-form" style="display:none; background:var(--color-bg-secondary); border-radius:var(--radius-lg); padding:1.25rem; margin-top:1rem;">
            <h3 style="margin-bottom:1rem; font-size: 1rem;">New Address</h3>
            <div class="form-grid-2">
              <div class="form-group"><label class="form-label">Full Name</label><input class="form-control" id="addr-name" required></div>
              <div class="form-group"><label class="form-label">Phone</label><input class="form-control" id="addr-phone" required></div>
            </div>
            <div class="form-group"><label class="form-label">Address Line 1</label><input class="form-control" id="addr-line1" required></div>
            <div class="form-group"><label class="form-label">Address Line 2 (Optional)</label><input class="form-control" id="addr-line2"></div>
            <div class="form-grid-3">
              <div class="form-group"><label class="form-label">City</label><input class="form-control" id="addr-city" required></div>
              <div class="form-group"><label class="form-label">State</label><input class="form-control" id="addr-state" required></div>
              <div class="form-group"><label class="form-label">Pincode</label><input class="form-control" id="addr-pincode" required></div>
            </div>
            <div style="display:flex; gap:0.75rem; flex-wrap:wrap;">
              <button type="submit" class="btn btn-primary">Save Address</button>
              <button type="button" class="btn btn-outline" id="cancel-address-btn">Cancel</button>
            </div>
          </form>
        </div>

        <!-- Profile Panel -->
        <div class="panel" id="panel-profile">
          <div class="panel-header">
            <h2 class="panel-title">Edit Profile</h2>
          </div>
          
          <!-- Avatar section -->
          <div style="display:flex; align-items:center; gap:1.25rem; margin-bottom:2rem; padding: 1.25rem; background: var(--color-bg-secondary); border-radius: var(--radius-lg);">
            <div class="avatar-wrap">
              <img id="profile-avatar" class="avatar" style="width:72px;height:72px;" src="https://ui-avatars.com/api/?name=User&background=e5e7eb&color=6b7280&size=160&font-size=0.4" alt="Avatar">
            </div>
            <div>
              <div style="font-weight:600; margin-bottom:0.5rem;">Profile Photo</div>
              <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
                <button class="btn btn-outline btn-sm" id="change-avatar-btn-profile">Upload Photo</button>
                <input type="file" id="hidden-avatar-input" accept="image/*" style="display:none;">
                <button class="btn btn-outline btn-sm" id="remove-avatar-btn" style="color:var(--color-danger); display:none;">Remove</button>
              </div>
            </div>
          </div>

          <form id="profile-form" style="max-width:520px;">
            <div class="form-grid-2">
              <div class="form-group"><label class="form-label">Full Name</label><input type="text" id="profile-name" class="form-control" placeholder="Your name"></div>
              <div class="form-group"><label class="form-label">Phone</label><input type="tel" id="profile-phone" class="form-control" placeholder="+91 00000 00000"></div>
            </div>
            <div class="form-group"><label class="form-label">Email</label><input type="email" id="profile-email" class="form-control" disabled style="opacity:0.6;"></div>
            <button type="submit" class="btn btn-primary" id="save-profile-btn" style="margin-top:0.5rem;">Save Changes</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module">
    import { HEADER_HTML, FOOTER_HTML, BOTTOM_NAV_HTML, initPage } from './js/header.js';
    import { logout, requireAuth } from './js/auth.js';
    import { supabase } from './js/supabase.js';
    import { showToast } from './js/toast.js';
    import { fetchProducts, renderProductCards } from './js/products.js';
    import { uploadFileDirectly, optimizeCloudinaryUrl } from './js/cloudinary.js';

    document.getElementById('header-placeholder').innerHTML = HEADER_HTML;
    document.getElementById('footer-placeholder').innerHTML = FOOTER_HTML;
    document.body.insertAdjacentHTML('beforeend', BOTTOM_NAV_HTML);

    async function init() {
      const { user, profile } = await initPage();
      if (!user) { window.location.href = './login.html?returnUrl=./account.html'; return; }

      // Set sidebar info
      const avatarUrl = profile?.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile?.full_name || 'User')}&background=e5e7eb&color=6b7280&size=160&font-size=0.4`;
      document.getElementById('user-avatar').src = avatarUrl;
      document.getElementById('profile-avatar').src = avatarUrl;
      document.getElementById('sidebar-name').textContent = profile?.full_name || 'User';
      
      const { data: { user: authUser } } = await supabase.auth.getUser();
      const email = authUser?.email || '';
      document.getElementById('sidebar-email').textContent = email;
      document.getElementById('profile-email').value = email;

      if (profile?.avatar_url) {
        document.getElementById('remove-avatar-btn').style.display = 'inline-flex';
      }

      // Tab navigation
      document.querySelectorAll('.tab-item[data-panel]').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
        });
      });

      // Hash routing
      const hash = window.location.hash.replace('#', '');
      if (hash) {
        const btn = document.querySelector(`[data-panel="${hash}"]`);
        if (btn) btn.click();
      }

      document.getElementById('logout-btn').addEventListener('click', () => logout());

      // ---- PROFILE ----
      if (profile) {
        document.getElementById('profile-name').value = profile.full_name || '';
        document.getElementById('profile-phone').value = profile.phone || '';
      }

      document.getElementById('profile-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('save-profile-btn');
        btn.disabled = true; btn.textContent = 'Saving...';
        const { error } = await supabase.from('profiles').update({
          full_name: document.getElementById('profile-name').value,
          phone: document.getElementById('profile-phone').value
        }).eq('id', user.id);
        btn.disabled = false; btn.textContent = 'Save Changes';
        if (error) showToast('Error saving profile', 'error');
        else {
          showToast('Profile updated!', 'success');
          document.getElementById('sidebar-name').textContent = document.getElementById('profile-name').value || 'User';
        }
      });

      // Avatar upload handlers
      const hiddenInput = document.getElementById('hidden-avatar-input');
      
      function handleAvatarUpload() {
        hiddenInput.click();
      }
      
      hiddenInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        showToast('Uploading photo...', 'info');
        try {
          const res = await uploadFileDirectly(file);
          const url = res.url;
          const { error } = await supabase.from('profiles').update({ avatar_url: url }).eq('id', user.id);
          
          if (!error) {
            document.getElementById('user-avatar').src = url;
            document.getElementById('profile-avatar').src = url;
            document.getElementById('remove-avatar-btn').style.display = 'inline-flex';
            showToast('Profile photo updated!', 'success');
          } else {
            showToast('Failed to save photo URL', 'error');
          }
        } catch (err) {
          showToast(err.message || 'Upload failed', 'error');
        } finally {
          hiddenInput.value = ''; // Reset input
        }
      });
      
      document.getElementById('change-avatar-btn').addEventListener('click', handleAvatarUpload);
      document.getElementById('change-avatar-btn-profile').addEventListener('click', handleAvatarUpload);
      
      document.getElementById('remove-avatar-btn').addEventListener('click', async () => {
        const { error } = await supabase.from('profiles').update({ avatar_url: null }).eq('id', user.id);
        if (!error) {
          const fallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(profile?.full_name || 'User')}&background=e5e7eb&color=6b7280&size=160&font-size=0.4`;
          document.getElementById('user-avatar').src = fallback;
          document.getElementById('profile-avatar').src = fallback;
          document.getElementById('remove-avatar-btn').style.display = 'none';
          showToast('Profile photo removed', 'info');
        }
      });

      // ---- ORDERS ----
      const { data: orders } = await supabase
        .from('orders')
        .select(`*, order_items(*)`)
        .eq('user_id', user.id)
        .order('created_at', { ascending: false });

      const COURIER_URLS = {
        'Blue Dart': id => `https://www.bluedart.com/tracking?wbns=${id}`,
        'DTDC': id => `https://www.dtdc.com/track-your-shipment/?trackingNumber=${id}`,
        'Delhivery': id => `https://www.delhivery.com/tracking/?tracking_id=${id}`,
        'India Post': id => `https://www.indiapost.gov.in/_layouts/15/dop.portal.tracking/trackconsignment.aspx?id=${id}`,
        'Shadowfax': id => `https://www.shadowfax.in/track?awb=${id}`,
        'Ekart': id => `https://www.ekartlogistics.in/track-order?tracking_number=${id}`,
        'FedEx': id => `https://www.fedex.com/fedextrack/?trknbr=${id}`,
        'DHL': id => `https://www.dhl.com/in-en/home/tracking.html?tracking-id=${id}`,
      };

      const STATUS_STEPS = ['confirmed', 'shipped', 'delivered'];

      function getStepState(step, currentStatus) {
        if (currentStatus === 'cancelled') return step === 'confirmed' ? 'cancelled' : 'none';
        const currentIdx = STATUS_STEPS.indexOf(currentStatus);
        const stepIdx = STATUS_STEPS.indexOf(step);
        if (stepIdx < currentIdx) return 'done';
        if (stepIdx === currentIdx) return 'active';
        return 'none';
      }

      function renderTimeline(status) {
        if (status === 'pending') return '<div style="font-size:0.82rem;color:var(--color-text-muted);padding:0.5rem 0;">⏳ Order is being reviewed...</div>';
        if (status === 'cancelled') return '<div style="font-size:0.82rem;color:var(--color-danger);font-weight:600;padding:0.5rem 0;">❌ Order Cancelled</div>';
        const icons = {confirmed:'✓',shipped:'🚚',delivered:'🏠'};
        const labels = {confirmed:'Confirmed',shipped:'Shipped',delivered:'Delivered'};
        return '<div class="order-timeline">' + STATUS_STEPS.map((step, i) => {
          const state = getStepState(step, status);
          const prevDone = i > 0 ? (getStepState(STATUS_STEPS[i-1], status) === 'done' ? 'done' : '') : '';
          return (i > 0 ? `<div class="timeline-line ${prevDone}"></div>` : '') +
            `<div class="timeline-step"><div class="timeline-dot ${state}">${state !== 'none' ? icons[step] : (i+1)}</div><div class="timeline-label ${state}">${labels[step]}</div></div>`;
        }).join('') + '</div>';
      }

      function renderOrderCard(o) {
        const items = o.order_items || [];
        const trackUrl = o.courier_name && o.tracking_id && COURIER_URLS[o.courier_name]
          ? COURIER_URLS[o.courier_name](o.tracking_id) : null;
        const statusColors = {pending:'#6b7280',confirmed:'#4f46e5',shipped:'#d97706',delivered:'#16a34a',cancelled:'#dc2626'};
        const statusBg = {pending:'#f3f4f6',confirmed:'#e0e7ff',shipped:'#fef3c7',delivered:'#dcfce7',cancelled:'#fee2e2'};
        const sc = statusColors[o.status] || '#6b7280';
        const sb = statusBg[o.status] || '#f3f4f6';
        const firstImg = items[0]?.product_snapshot?.image_url || '';
        const itemNames = items.map(i => i.product_snapshot?.name || 'Item').slice(0,2).join(', ');
        const moreCount = items.length > 2 ? ` +${items.length - 2} more` : '';

        const itemsHtml = items.map(item => {
          const snap = item.product_snapshot || {};
          return `<div class="order-item-row">
            ${snap.image_url ? `<img src="${snap.image_url}" class="order-item-img">` : '<div class="order-item-img"></div>'}
            <div style="flex:1;min-width:0;">
              <div style="font-weight:600;font-size:0.88rem;">${snap.name || 'Product'}</div>
              ${snap.variant_label ? `<div style="font-size:0.78rem;color:var(--color-text-muted);">${snap.variant_label}</div>` : ''}
              <div style="font-size:0.78rem;color:var(--color-text-muted);">Qty: ${item.quantity}</div>
            </div>
            <div style="font-weight:700;font-size:0.9rem;flex-shrink:0;">₹${(item.price_at_purchase * item.quantity).toFixed(0)}</div>
          </div>`;
        }).join('');

        const addr = o.shipping_address || {};
        const addrHtml = addr.name ? `<div style="font-size:0.82rem;color:var(--color-text-muted);">
          <span style="font-weight:600;color:var(--color-text);">Delivered to: </span>
          ${addr.name}, ${addr.line1}${addr.line2 ? ', '+addr.line2 : ''}, ${addr.city}, ${addr.state} ${addr.pincode} · 📞 ${addr.phone}
        </div>` : '';

        return `<div class="order-card" id="ocard-${o.id}">
          <div class="order-summary-row" onclick="window.toggleOrder('${o.id}')">
            ${firstImg ? `<img src="${firstImg}" style="width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;">` : '<div style="width:44px;height:44px;border-radius:8px;background:var(--color-bg-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.4rem;">📦</div>'}
            <div style="flex:1;min-width:0;">
              <div style="font-weight:700;font-size:0.82rem;margin-bottom:0.15rem;">ORDER #${o.id.substring(0,8).toUpperCase()}</div>
              <div class="order-meta" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${itemNames}${moreCount}</div>
              <div class="order-meta">${new Date(o.created_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</div>
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div style="font-weight:700;font-size:1rem;">₹${parseFloat(o.total).toLocaleString('en-IN')}</div>
              <span style="display:inline-block;margin-top:0.25rem;padding:0.2rem 0.6rem;border-radius:999px;font-size:0.7rem;font-weight:700;background:${sb};color:${sc};text-transform:capitalize;">${o.status}</span>
            </div>
            <svg class="order-toggle-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </div>
          <div class="order-body">
            <div class="order-body-inner">
              ${renderTimeline(o.status)}
              ${trackUrl ? `<div style="margin-bottom:1.1rem;"><a href="${trackUrl}" target="_blank" rel="noopener" class="track-btn">🚚 Track Package — ${o.courier_name} (${o.tracking_id})</a></div>` : ''}
              <div style="font-weight:700;font-size:0.85rem;margin-bottom:0.5rem;">Items Ordered</div>
              <div style="margin-bottom:1.1rem;">${itemsHtml}</div>
              <div style="background:var(--color-bg-secondary);border-radius:var(--radius-md);padding:0.85rem;margin-bottom:1rem;">
                <div style="font-weight:700;font-size:0.85rem;margin-bottom:0.6rem;">Payment Summary</div>
                <div class="pay-row"><span class="text-muted">Subtotal</span><span>₹${parseFloat(o.subtotal).toLocaleString('en-IN')}</span></div>
                ${o.discount > 0 ? `<div class="pay-row"><span class="text-muted">Discount ${o.coupon_code ? '('+o.coupon_code+')' : ''}</span><span style="color:var(--color-success);">-₹${parseFloat(o.discount).toLocaleString('en-IN')}</span></div>` : ''}
                <div class="pay-row"><span class="text-muted">Shipping</span><span>${o.shipping_charge == 0 ? '<span style=\"color:var(--color-success)\">FREE</span>' : '₹'+o.shipping_charge}</span></div>
                <div class="pay-row" style="font-weight:700;font-size:0.95rem;border-top:1px solid var(--color-border);padding-top:0.5rem;margin-top:0.25rem;"><span>Total Paid</span><span style="color:var(--color-accent);">₹${parseFloat(o.total).toLocaleString('en-IN')}</span></div>
                <div class="pay-row" style="margin-top:0.3rem;"><span class="text-muted">Payment</span><span>${o.razorpay_payment_id ? '💳 Online' : '💵 Cash on Delivery'}</span></div>
              </div>
              ${addrHtml}
            </div>
          </div>
        </div>`;
      }

      const ordersEl = document.getElementById('orders-list');
      if (!orders || orders.length === 0) {
        ordersEl.innerHTML = '<div class="empty-state"><div class="icon">📦</div><h3>No orders yet</h3><p class="text-muted" style="margin:0.5rem 0 1.5rem;">Your orders will appear here</p><a href="./shop.html" class="btn btn-primary">Start Shopping</a></div>';
      } else {
        ordersEl.innerHTML = orders.map(renderOrderCard).join('');
      }

      window.toggleOrder = function(id) {
        const card = document.getElementById('ocard-' + id);
        if (card) card.classList.toggle('expanded');
      };

            // ---- WISHLIST ----
      const { data: wl } = await supabase
        .from('wishlist')
        .select('product_id, products(*, product_media(url, sort_order))')
        .eq('user_id', user.id);

      const wlGrid = document.getElementById('wishlist-grid');
      if (!wl || wl.length === 0) {
        wlGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">❤️</div><h3>Wishlist is empty</h3><p class="text-muted" style="margin:0.5rem 0 1.5rem;">Save items you love for later</p><a href="./shop.html" class="btn btn-primary">Browse Products</a></div>`;
      } else {
        const prods = wl.map(w => { 
          const p = w.products; 
          if (!p) return null; 
          let rawUrl = p.product_media?.sort((a,b)=>a.sort_order-b.sort_order)[0]?.url || 'https://placehold.co/400x500?text=No+Image'; 
          p.main_image_url = optimizeCloudinaryUrl(rawUrl, 400);
          p.hover_image_url = p.main_image_url; 
          return p; 
        }).filter(Boolean);
        renderProductCards(prods, 'wishlist-grid');
      }

      // ---- ADDRESSES ----
      async function loadAddresses() {
        const { data: addrs } = await supabase.from('addresses').select('*').eq('user_id', user.id).order('is_default', { ascending: false });
        const el = document.getElementById('addresses-list');
        if (!addrs || addrs.length === 0) {
          el.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">📍</div><h3>No addresses saved</h3><p class="text-muted" style="margin:0.5rem 0 0;">Add a delivery address to get started.</p></div>`;
          return;
        }
        el.innerHTML = addrs.map(a => `
          <div class="address-card ${a.is_default ? 'default' : ''}">
            ${a.is_default ? '<div style="font-size:0.68rem; color:var(--color-accent); font-weight:700; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.5rem;">✓ Default</div>' : ''}
            <div style="font-weight:600; margin-bottom:0.25rem;">${a.name}</div>
            <div class="text-muted" style="font-size:0.85rem; line-height:1.5;">${a.line1}${a.line2 ? ', ' + a.line2 : ''}<br>${a.city}, ${a.state} - ${a.pincode}</div>
            <div class="text-muted" style="font-size:0.85rem; margin-top:0.25rem;">📞 ${a.phone}</div>
            <div style="margin-top:0.75rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
              ${!a.is_default ? `<button class="btn btn-outline btn-sm" onclick="setDefault('${a.id}')">Set Default</button>` : ''}
              <button class="btn btn-outline btn-sm" onclick="deleteAddr('${a.id}')" style="color:var(--color-danger); border-color:var(--color-danger);">Delete</button>
            </div>
          </div>
        `).join('');
      }

      window.setDefault = async (id) => {
        await supabase.from('addresses').update({ is_default: false }).eq('user_id', user.id);
        await supabase.from('addresses').update({ is_default: true }).eq('id', id);
        loadAddresses(); showToast('Default address updated', 'success');
      };
      window.deleteAddr = async (id) => {
        await supabase.from('addresses').delete().eq('id', id);
        loadAddresses(); showToast('Address removed', 'info');
      };

      document.getElementById('add-address-btn').addEventListener('click', () => {
        document.getElementById('address-form').style.display = 'block';
        document.getElementById('add-address-btn').style.display = 'none';
      });
      document.getElementById('cancel-address-btn').addEventListener('click', () => {
        document.getElementById('address-form').style.display = 'none';
        document.getElementById('add-address-btn').style.display = 'inline-flex';
      });
      document.getElementById('address-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const { error } = await supabase.from('addresses').insert({
          user_id: user.id,
          name: document.getElementById('addr-name').value,
          phone: document.getElementById('addr-phone').value,
          line1: document.getElementById('addr-line1').value,
          line2: document.getElementById('addr-line2').value,
          city: document.getElementById('addr-city').value,
          state: document.getElementById('addr-state').value,
          pincode: document.getElementById('addr-pincode').value,
          is_default: false
        });
        if (error) { showToast('Error saving address', 'error'); return; }
        document.getElementById('address-form').reset();
        document.getElementById('address-form').style.display = 'none';
        document.getElementById('add-address-btn').style.display = 'inline-flex';
        showToast('Address saved!', 'success');
        loadAddresses();
      });

      loadAddresses();
    }

    init();
  </script>
</body>
</html>
