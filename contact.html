<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Contact Us - My Store</title>
  <link rel="stylesheet" href="./css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .contact-layout { display: grid; grid-template-columns: 1fr; gap: 3rem; }
    @media (min-width: 768px) { .contact-layout { grid-template-columns: 1fr 1fr; } }
    .contact-info { background: var(--color-bg-secondary); padding: 2rem; border-radius: var(--radius-lg); }
    .info-item { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.5rem; }
    .info-icon { font-size: 1.5rem; color: var(--color-accent); }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="container section">
    <div style="text-align: center; margin-bottom: 3rem;">
      <h1 style="margin-bottom: 1rem;">Get in Touch</h1>
      <p class="text-muted" style="font-size: 1.1rem;">Have a question? We'd love to hear from you.</p>
    </div>

    <div class="contact-layout">
      <div>
        <form id="contact-form" class="product-card" style="padding: 2rem;">
          <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" id="name" class="form-control" required placeholder="John Doe">
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" class="form-control" required placeholder="john@example.com">
          </div>
          <div class="form-group">
            <label class="form-label" for="subject">Subject</label>
            <input type="text" id="subject" class="form-control" required placeholder="How can we help?">
          </div>
          <div class="form-group">
            <label class="form-label" for="message">Message</label>
            <textarea id="message" class="form-control" rows="5" required placeholder="Your message here..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Send Message</button>
        </form>
      </div>

      <div>
        <div class="contact-info">
          <h3 style="margin-bottom: 1.5rem;">Contact Information</h3>
          
          <div class="info-item">
            <div class="info-icon">📍</div>
            <div>
              <div style="font-weight: 600; margin-bottom: 0.25rem;">Our Office</div>
              <p class="text-muted">123 Commerce Street, Tech Park<br>Bangalore, KA 560001<br>India</p>
            </div>
          </div>
          
          <div class="info-item">
            <div class="info-icon">✉️</div>
            <div>
              <div style="font-weight: 600; margin-bottom: 0.25rem;">Email Us</div>
              <p class="text-muted"><a href="mailto:support@mystore.com">support@mystore.com</a></p>
            </div>
          </div>
          
          <div class="info-item">
            <div class="info-icon">📞</div>
            <div>
              <div style="font-weight: 600; margin-bottom: 0.25rem;">Call Us</div>
              <p class="text-muted"><a href="tel:+919876543210">+91 98765 43210</a></p>
              <p class="text-muted" style="font-size: 0.8rem; margin-top: 0.25rem;">Mon-Fri, 9am - 6pm</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module">
    import { HEADER_HTML, FOOTER_HTML, BOTTOM_NAV_HTML, initPage } from './js/header.js';
    import { showToast } from './js/toast.js';
    
    document.getElementById('header-placeholder').innerHTML = HEADER_HTML;
    document.getElementById('footer-placeholder').innerHTML = FOOTER_HTML;
    document.body.insertAdjacentHTML('beforeend', BOTTOM_NAV_HTML);

    initPage();

    document.getElementById('contact-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      
      // Simulate API call
      setTimeout(() => {
        showToast('Message sent successfully! We will get back to you soon.', 'success');
        document.getElementById('contact-form').reset();
        btn.disabled = false;
        btn.textContent = 'Send Message';
      }, 1000);
    });
  </script>
</body>
</html>
