<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - My Store</title>
  <link rel="stylesheet" href="./css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .auth-wrapper { min-height: 100vh; display: grid; place-items: center; background: var(--color-bg-secondary); padding: 2rem 1rem; }
    .auth-card { background: white; border-radius: var(--radius-lg); padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: var(--shadow-md); }
    .auth-logo { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 1.75rem; }
    .auth-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .auth-subtitle { color: var(--color-text-muted); font-size: 0.9rem; margin-bottom: 1.75rem; }
    .auth-link { color: var(--color-accent); font-weight: 500; }
    .auth-link:hover { text-decoration: underline; }
    .divider { text-align: center; color: var(--color-text-muted); font-size: 0.8rem; margin: 1.25rem 0; }
    .error-msg { color: var(--color-danger); font-size: 0.8rem; margin-top: 0.25rem; }
  </style>
</head>
<body>
  <div style="position:sticky;top:0;z-index:50;background:white;border-bottom:1px solid var(--color-border);">
    <div class="container header-inner">
      <a href="./" class="logo">My Store</a>
    </div>
  </div>

  <div id="toast-container"></div>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">🛍️</div>
      <h1 class="auth-title">Create account</h1>
      <p class="auth-subtitle">Join us and start shopping</p>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="full-name">Full Name</label>
          <input type="text" id="full-name" class="form-control" required autocomplete="name" placeholder="Your full name">
          <div class="error-msg" id="name-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input type="email" id="email" class="form-control" required autocomplete="email" placeholder="you@example.com">
          <div class="error-msg" id="email-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control" required autocomplete="new-password" placeholder="Min. 6 characters">
          <div class="error-msg" id="pw-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-control" required autocomplete="new-password" placeholder="Repeat password">
          <div class="error-msg" id="cpw-error"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="register-btn" style="padding:0.9rem;font-size:1rem;margin-top:0.5rem;">
          Create Account
        </button>
      </form>

      <div class="divider">— or —</div>

      <p style="text-align:center;font-size:0.9rem;">
        Already have an account?
        <a href="./login.html" class="auth-link">Sign in</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { register } from './js/auth.js';
    import { showToast } from './js/toast.js';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const fullName = document.getElementById('full-name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;

      // Clear errors
      ['name-error','email-error','pw-error','cpw-error'].forEach(id => document.getElementById(id).textContent = '');

      let valid = true;
      if (!fullName) { document.getElementById('name-error').textContent = 'Full name is required'; valid = false; }
      if (!email || !/\S+@\S+\.\S+/.test(email)) { document.getElementById('email-error').textContent = 'Valid email required'; valid = false; }
      if (password.length < 6) { document.getElementById('pw-error').textContent = 'Password must be at least 6 characters'; valid = false; }
      if (password !== confirm) { document.getElementById('cpw-error').textContent = 'Passwords do not match'; valid = false; }
      if (!valid) return;

      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const user = await register(fullName, email, password);
      if (user) {
        setTimeout(() => { window.location.href = './account.html'; }, 1500);
      } else {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
