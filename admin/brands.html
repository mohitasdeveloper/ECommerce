<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Manage Brands - Admin</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/admin.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-logo">Admin Panel</div>
            <nav class="admin-nav">
                <a href="index.html">Dashboard</a>
                <a href="products.html">Products</a>
                <a href="categories.html">Categories</a>
                <a href="brands.html" class="active">Brands</a>
                <a href="orders.html">Orders</a>
                <a href="coupons.html">Coupons</a>
                <a href="reviews.html">Reviews</a>
                <a href="blog.html">Blog</a>
                <a href="settings.html">Settings</a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <h1 style="font-size: 1.25rem; margin: 0;">Brands</h1>
                <button id="add-brand-btn" class="btn btn-primary btn-sm">+ Add Brand</button>
            </header>

            <div class="admin-content">
                <div class="table-container">
                    <table style="width: 100%;">
                        <thead>
                            <tr>
                                <th>Logo</th>
                                <th>Brand Name</th>
                                <th>Slug</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="brands-tbody">
                            <tr>
                                <td colspan="4">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="brand-modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="d-flex justify-between align-center mb-4 pb-3"
                style="border-bottom:1px solid var(--color-border);">
                <h2 id="modal-title" style="margin:0;">Add Brand</h2>
                <button type="button" id="close-modal-btn" class="btn"
                    style="padding:0.5rem; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; background:var(--color-bg-secondary);">✕</button>
            </div>
            <form id="brand-form">
                <input type="hidden" id="brand-id">

                <div class="form-group mb-4">
                    <label class="form-label">Brand Name</label>
                    <input type="text" id="brand-name" class="form-control" required placeholder="e.g. Samsung">
                </div>

                <div class="form-group mb-4">
                    <label class="form-label">Slug</label>
                    <input type="text" id="brand-slug" class="form-control" required placeholder="e.g. samsung">
                </div>

                <div class="form-group mb-4 pb-4" style="border-bottom:1px solid var(--color-border);">
                    <label class="form-label">Brand Logo (Optional)</label>
                    <div class="d-flex align-center gap-4">
                        <button type="button" class="btn btn-outline btn-sm" id="upload-logo-btn">Upload Logo</button>
                        <input type="hidden" id="brand-image-url">
                        <img id="image-preview" src=""
                            style="display:none; width:60px; height:60px; object-fit:contain; border:1px solid var(--color-border); border-radius:var(--radius-sm); padding:4px;">
                        <button type="button" class="btn btn-danger btn-sm" id="remove-logo-btn"
                            style="display:none;">Remove</button>
                    </div>
                </div>

                <div class="d-flex justify-end gap-3 mt-4">
                    <button type="button" class="btn btn-outline"
                        onclick="document.getElementById('brand-modal').classList.remove('active')">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-brand-btn">Save Brand</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initAuth } from '../js/auth.js';
        import { checkAdmin } from '../js/admin.js';
        import { supabase } from '../js/supabase.js';
        import { showToast } from '../js/toast.js';
        import { openUploadWidget } from '../js/cloudinary.js';

        async function init() {
            await initAuth();
            await checkAdmin();
            loadBrands();

            document.getElementById('add-brand-btn').addEventListener('click', () => {
                document.getElementById('brand-form').reset();
                document.getElementById('brand-id').value = '';
                document.getElementById('brand-image-url').value = '';
                document.getElementById('image-preview').style.display = 'none';
                document.getElementById('remove-logo-btn').style.display = 'none';
                document.getElementById('modal-title').textContent = 'Add Brand';
                document.getElementById('brand-modal').classList.add('active');
            });

            document.getElementById('close-modal-btn').addEventListener('click', () => document.getElementById('brand-modal').classList.remove('active'));
            document.getElementById('remove-logo-btn').addEventListener('click', () => {
                document.getElementById('brand-image-url').value = '';
                document.getElementById('image-preview').style.display = 'none';
                document.getElementById('remove-logo-btn').style.display = 'none';
            });

            document.getElementById('brand-name').addEventListener('input', (e) => {
                if (!document.getElementById('brand-id').value) document.getElementById('brand-slug').value = e.target.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
            });

            document.getElementById('upload-logo-btn').addEventListener('click', () => {
                openUploadWidget({ maxFiles: 1 }, (result) => {
                    document.getElementById('brand-image-url').value = result.url;
                    document.getElementById('image-preview').src = result.url;
                    document.getElementById('image-preview').style.display = 'block';
                    document.getElementById('remove-logo-btn').style.display = 'block';
                });
            });

            document.getElementById('brand-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('save-brand-btn'); btn.disabled = true; btn.textContent = 'Saving...';
                const id = document.getElementById('brand-id').value;
                const data = { name: document.getElementById('brand-name').value, slug: document.getElementById('brand-slug').value, image_url: document.getElementById('brand-image-url').value || null };
                const { error } = id ? await supabase.from('brands').update(data).eq('id', id) : await supabase.from('brands').insert([data]);
                btn.disabled = false; btn.textContent = 'Save Brand';
                if (error) { showToast(error.message, 'error'); } else { showToast('Brand saved', 'success'); document.getElementById('brand-modal').classList.remove('active'); loadBrands(); }
            });
        }

        async function loadBrands() {
            const { data } = await supabase.from('brands').select('*').order('name');
            const tbody = document.getElementById('brands-tbody');
            if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="4">No brands found.</td></tr>'; return; }
            tbody.innerHTML = data.map(b => `<tr><td>${b.image_url ? `<img src="${b.image_url}" style="width:40px;height:40px;object-fit:contain;border:1px solid var(--color-border);padding:2px;border-radius:4px;">` : '<div style="width:40px;height:40px;background:#eee;border-radius:4px;"></div>'}</td><td class="fw-bold">${b.name}</td><td class="text-muted text-sm">${b.slug}</td><td><button class="btn btn-outline btn-sm" onclick="window.editBrand('${b.id}')">Edit</button> <button class="btn btn-danger btn-sm" onclick="window.deleteBrand('${b.id}')">Delete</button></td></tr>`).join('');
            window.editBrand = (id) => { const b = data.find(x => x.id === id); if (!b) return; document.getElementById('brand-id').value = b.id; document.getElementById('brand-name').value = b.name; document.getElementById('brand-slug').value = b.slug; document.getElementById('brand-image-url').value = b.image_url || ''; if (b.image_url) { document.getElementById('image-preview').src = b.image_url; document.getElementById('image-preview').style.display = 'block'; document.getElementById('remove-logo-btn').style.display = 'block'; } else { document.getElementById('image-preview').style.display = 'none'; document.getElementById('remove-logo-btn').style.display = 'none'; } document.getElementById('modal-title').textContent = 'Edit Brand'; document.getElementById('brand-modal').classList.add('active'); };
            window.deleteBrand = async (id) => { if (!confirm('Delete this brand?')) return; const { error } = await supabase.from('brands').delete().eq('id', id); if (error) showToast(error.message, 'error'); else { showToast('Deleted', 'info'); loadBrands(); } };
        }
        init();
    </script>
</body>

</html>
