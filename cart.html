<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart - My Store</title>
  <link rel="stylesheet" href="./css/main.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="./" class="logo">My Store</a>
    </div>
  </header>

  <main class="container py-8">
    <h1 class="mb-4">Shopping Cart</h1>

    <div id="cart-container" class="d-flex gap-4" style="flex-wrap: wrap;">
      <!-- Main Cart Items -->
      <div style="flex: 2; min-width: 300px;">
        <div id="cart-items">
          Loading...
        </div>
      </div>

      <!-- Order Summary -->
      <div style="flex: 1; min-width: 300px;">
        <div class="product-card" style="padding: 1.5rem;">
          <h3 class="mb-4">Order Summary</h3>
          <div class="d-flex justify-between mb-2">
            <span class="text-muted">Subtotal</span>
            <span class="fw-bold" id="summary-subtotal">₹0</span>
          </div>
          <div class="d-flex justify-between mb-4 pb-4" style="border-bottom: 1px solid var(--color-border);">
            <span class="text-muted">Shipping</span>
            <span class="fw-bold">Calculated at checkout</span>
          </div>
          <div class="d-flex justify-between mb-4" style="font-size: 1.25rem;">
            <span class="fw-bold">Total</span>
            <span class="fw-bold" id="summary-total">₹0</span>
          </div>
          <button class="btn btn-primary btn-block" id="checkout-btn">Proceed to Checkout</button>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { initAuth } from './js/auth.js';
    import { getCart, updateQuantity, removeFromCart, getCartTotal } from './js/cart.js';

    async function init() {
      await initAuth();
      renderCart();
      
      window.addEventListener('cartUpdated', renderCart);
    }

    window.changeQty = function(id, delta) {
      const cart = getCart();
      const item = cart.find(i => i.cartItemId === id);
      if (item) {
        updateQuantity(id, item.quantity + delta);
        renderCart();
      }
    }

    window.removeItem = function(id) {
      removeFromCart(id);
      renderCart();
    }

    function renderCart() {
      const cart = getCart();
      const container = document.getElementById('cart-items');
      
      if (cart.length === 0) {
        container.innerHTML = `<div class="text-center py-8">
          <p class="text-muted mb-4">Your cart is empty.</p>
          <a href="./shop.html" class="btn btn-primary">Continue Shopping</a>
        </div>`;
        document.getElementById('checkout-btn').disabled = true;
        document.getElementById('summary-subtotal').textContent = '₹0';
        document.getElementById('summary-total').textContent = '₹0';
        return;
      }

      document.getElementById('checkout-btn').disabled = false;

      container.innerHTML = cart.map(item => `
        <div class="d-flex gap-4 align-center mb-4 pb-4" style="border-bottom: 1px solid var(--color-border);">
          <img src="${item.image_url}" alt="${item.name}" style="width: 80px; height: 80px; object-fit: cover; border-radius: var(--radius-sm);">
          <div style="flex-grow: 1;">
            <h4 style="margin-bottom: 0.25rem;">${item.name}</h4>
            <div class="text-muted" style="font-size: 0.875rem;">${item.variant_label || ''}</div>
            <div class="fw-bold mt-2">₹${item.price}</div>
          </div>
          <div class="d-flex align-center gap-2">
            <div class="form-control d-flex align-center p-0" style="width: auto;">
              <button class="btn btn-sm" onclick="window.changeQty('${item.cartItemId}', -1)">-</button>
              <span style="width: 30px; text-align: center;">${item.quantity}</span>
              <button class="btn btn-sm" onclick="window.changeQty('${item.cartItemId}', 1)">+</button>
            </div>
            <button class="btn btn-danger btn-sm" onclick="window.removeItem('${item.cartItemId}')">Remove</button>
          </div>
        </div>
      `).join('');

      const total = getCartTotal();
      document.getElementById('summary-subtotal').textContent = `₹${total}`;
      document.getElementById('summary-total').textContent = `₹${total}`;
    }

    document.getElementById('checkout-btn').addEventListener('click', () => {
      window.location.href = './checkout.html';
    });

    init();
  </script>
</body>
</html>
