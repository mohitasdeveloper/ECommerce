<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Order Success - My Store</title>
  <link rel="stylesheet" href="./css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="container section text-center" style="max-width: 600px; padding-top: 3rem; padding-bottom: 3rem;">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--color-success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto 2rem;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    
    <h1 style="margin-bottom: 1rem; font-size: clamp(1.5rem, 4vw, 2rem);">Thank You for Your Order!</h1>
    <p class="text-muted" style="margin-bottom: 1.5rem; font-size: 1rem; line-height: 1.6;">Your order has been placed successfully and is being processed.</p>
    
    <div id="order-details" style="background:var(--color-bg-secondary); padding: 1.5rem; border-radius: var(--radius-lg); margin-bottom: 2rem; text-align: left;">
      <div class="d-flex justify-between mb-2"><span class="text-muted">Order ID</span><span class="fw-bold" id="order-id">—</span></div>
      <div class="d-flex justify-between mb-2"><span class="text-muted">Total</span><span class="fw-bold" id="order-total">—</span></div>
      <div class="d-flex justify-between"><span class="text-muted">Status</span><span class="badge-stock in-stock" id="order-status">Processing</span></div>
    </div>

    <div style="display:flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
      <a href="./account.html#orders" class="btn btn-primary">View My Orders</a>
      <a href="./shop.html" class="btn btn-outline">Continue Shopping</a>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module">
    import { HEADER_HTML, FOOTER_HTML, BOTTOM_NAV_HTML, initPage } from './js/header.js';
    import { supabase } from './js/supabase.js';

    document.getElementById('header-placeholder').innerHTML = HEADER_HTML;
    document.getElementById('footer-placeholder').innerHTML = FOOTER_HTML;
    document.body.insertAdjacentHTML('beforeend', BOTTOM_NAV_HTML);

    async function init() {
      await initPage();
      
      const orderId = new URLSearchParams(window.location.search).get('order_id');
      if (orderId) {
        document.getElementById('order-id').textContent = '#' + orderId.substring(0,8).toUpperCase();
        const { data: order } = await supabase.from('orders').select('*').eq('id', orderId).single();
        if (order) {
          document.getElementById('order-total').textContent = `₹${parseFloat(order.total).toLocaleString('en-IN')}`;
          document.getElementById('order-status').textContent = order.status.charAt(0).toUpperCase() + order.status.slice(1);
        }
      }
    }

    init();
  </script>
</body>
</html>
