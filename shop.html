<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Shop - My Store</title>
  <meta name="description" content="Browse all products at My Store">
  <link rel="stylesheet" href="./css/main.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .shop-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    @media (min-width: 768px) {
      .shop-layout {
        grid-template-columns: 240px 1fr;
      }
    }

    .filter-sidebar {
      background: white;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      height: fit-content;
      position: sticky;
      top: 5rem;
    }

    .filter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .filter-title {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 0;
    }

    .filter-close-btn {
      display: none;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
      color: var(--color-text-muted);
    }

    .filter-group {
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--color-border);
    }

    .filter-group:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .filter-group label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      padding: 0.35rem 0;
      font-size: 0.9rem;
    }

    .filter-group input[type="radio"],
    .filter-group input[type="checkbox"] {
      accent-color: var(--color-accent);
      width: 16px;
      height: 16px;
    }

    .shop-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .filter-toggle-btn {
      display: none;
    }

    .filter-overlay {
      display: none;
    }

    .sort-label {
      font-size: 0.875rem;
      color: var(--color-text-muted);
      white-space: nowrap;
    }

    @media (max-width: 767px) {
      .filter-toggle-btn {
        display: inline-flex;
      }

      .sort-label {
        display: none;
      }

      .filter-sidebar {
        position: fixed;
        top: 0;
        left: -100%;
        width: 300px;
        max-width: 80vw;
        height: 100vh;
        z-index: 1000;
        border-radius: 0;
        border: none;
        transition: left 0.3s ease;
        overflow-y: auto;
        box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
      }

      .filter-sidebar.open {
        left: 0;
      }

      .filter-overlay {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
      }

      .filter-overlay.open {
        opacity: 1;
        visibility: visible;
      }

      .filter-close-btn {
        display: block;
      }
    }
  </style>
</head>

<body>
  <div id="header-placeholder"></div>

  <main class="container section">
    <div class="shop-top">
      <div>
        <h1 id="shop-title" style="font-size:1.5rem;margin-bottom:0.25rem;">All Products</h1>
        <p class="text-muted" id="product-count" style="font-size:0.875rem;"></p>
      </div>
      <div style="display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;">
        <button class="btn btn-outline btn-sm filter-toggle-btn" id="filter-toggle-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.35rem;">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
          </svg>
          Filters
        </button>
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <label for="sort-select" class="sort-label">Sort by:</label>
          <select id="sort-select" class="form-control"
            style="width:auto;font-size:0.875rem;padding-top:0.4rem;padding-bottom:0.4rem;min-height:36px;">
            <option value="newest">Newest</option>
            <option value="price_asc">Price: Low to High</option>
            <option value="price_desc">Price: High to Low</option>
          </select>
        </div>
      </div>
    </div>

    <div class="shop-layout">
      <div class="filter-overlay" id="filter-overlay"></div>

      <!-- Sidebar Filters -->
      <aside class="filter-sidebar" id="filter-sidebar">
        <div class="filter-header">
          <div class="filter-title">Filters</div>
          <button class="filter-close-btn" id="filter-close-btn" aria-label="Close filters">&times;</button>
        </div>

        <div class="filter-group">
          <div
            style="font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-muted);margin-bottom:0.75rem;">
            Category</div>
          <div id="category-filters">
            <label><input type="radio" name="category" value=""> All</label>
          </div>
        </div>

        <div class="filter-group">
          <div
            style="font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-muted);margin-bottom:0.75rem;">
            Availability</div>
          <label><input type="checkbox" id="in-stock-filter"> In Stock Only</label>
        </div>
      </aside>

      <!-- Product Grid -->
      <section>
        <div id="shop-products" class="product-grid">
          <div class="product-card skeleton" style="height:340px;"></div>
          <div class="product-card skeleton" style="height:340px;"></div>
          <div class="product-card skeleton" style="height:340px;"></div>
          <div class="product-card skeleton" style="height:340px;"></div>
        </div>
        <div class="text-center mt-8" id="load-more-wrap" style="display:none;">
          <button class="btn btn-outline" id="load-more-btn">Load More</button>
        </div>
      </section>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module">
    import { HEADER_HTML, FOOTER_HTML, BOTTOM_NAV_HTML, initPage } from './js/header.js';
    import { fetchProducts, renderProductCards } from './js/products.js';
    import { supabase } from './js/supabase.js';

    document.getElementById('header-placeholder').innerHTML = HEADER_HTML;
    document.getElementById('footer-placeholder').innerHTML = FOOTER_HTML;
    document.body.insertAdjacentHTML('beforeend', BOTTOM_NAV_HTML);

    const params = new URLSearchParams(window.location.search);
    let currentOptions = {
      categorySlug: params.get('category') || '',
      inStockOnly: false,
      sortBy: 'newest'
    };

    async function loadProducts() {
      document.getElementById('shop-products').innerHTML = '<div class="product-card skeleton" style="height:340px;"></div>'.repeat(4);
      const products = await fetchProducts(currentOptions);
      renderProductCards(products, 'shop-products');
      const countEl = document.getElementById('product-count');
      if (countEl) countEl.textContent = `${products.length} product${products.length !== 1 ? 's' : ''}`;
    }

    async function init() {
      await initPage();

      // Load categories for filter
      const { data: allCats } = await supabase.from('categories').select('*').order('sort_order');
      if (allCats) {
        const filtersEl = document.getElementById('category-filters');

        const parentCategories = allCats.filter(c => !c.parent_id);

        const filtersHtml = [
          `<label><input type="radio" name="category" value="" ${!currentOptions.categorySlug ? 'checked' : ''}> All</label>`,
          ...parentCategories.map(p => {
            const children = allCats.filter(s => s.parent_id === p.id);
            let parentHtml = `<div class="category-group" style="margin-top: 0.75rem;">
              <label style="font-weight: 600;">
                <input type="radio" name="category" value="${p.slug}" ${currentOptions.categorySlug === p.slug ? 'checked' : ''}> ${p.name}
              </label>`;

            if (children.length > 0) {
              parentHtml += `<div style="padding-left: 1.5rem; margin-top: 0.25rem; display: flex; flex-direction: column; gap: 0.35rem;">
                ${children.map(c => `
                  <label>
                    <input type="radio" name="category" value="${c.slug}" ${currentOptions.categorySlug === c.slug ? 'checked' : ''}> ${c.name}
                  </label>
                `).join('')}
              </div>`;
            }
            parentHtml += `</div>`;
            return parentHtml;
          })
        ].join('');

        filtersEl.innerHTML = filtersHtml;

        filtersEl.querySelectorAll('input[name="category"]').forEach(r => {
          r.addEventListener('change', e => {
            currentOptions.categorySlug = e.target.value;
            const url = new URL(window.location);
            if (e.target.value) {
              url.searchParams.set('category', e.target.value);
            } else {
              url.searchParams.delete('category');
            }
            window.history.pushState({}, '', url);
            const titleEl = document.getElementById('shop-title');
            if (titleEl) titleEl.textContent = e.target.value ? allCats.find(c => c.slug === e.target.value)?.name || 'Products' : 'All Products';
            loadProducts();
          });
        });
      }

      document.getElementById('in-stock-filter').addEventListener('change', e => {
        currentOptions.inStockOnly = e.target.checked;
        loadProducts();
      });
      document.getElementById('sort-select').addEventListener('change', e => {
        currentOptions.sortBy = e.target.value;
        loadProducts();
      });

      // Mobile filter toggle
      document.getElementById('filter-toggle-btn').addEventListener('click', () => {
        document.getElementById('filter-sidebar').classList.add('open');
        document.getElementById('filter-overlay').classList.add('open');
        document.body.style.overflow = 'hidden';
      });

      const closeFilters = () => {
        document.getElementById('filter-sidebar').classList.remove('open');
        document.getElementById('filter-overlay').classList.remove('open');
        document.body.style.overflow = '';
      };

      document.getElementById('filter-close-btn').addEventListener('click', closeFilters);
      document.getElementById('filter-overlay').addEventListener('click', closeFilters);

      // Set initial title from URL
      if (currentOptions.categorySlug && allCats) {
        const cat = allCats.find(c => c.slug === currentOptions.categorySlug);
        if (cat) document.getElementById('shop-title').textContent = cat.name;
      }

      loadProducts();
    }

    init();
  </script>
</body>

</html>
