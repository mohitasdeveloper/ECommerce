<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Checkout - My Store</title>
  <link rel="stylesheet" href="./css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Razorpay script -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    .checkout-layout { display: grid; grid-template-columns: 1fr; gap: 2rem; }
    @media (min-width: 768px) { .checkout-layout { grid-template-columns: 1.5fr 1fr; } }

    .checkout-card { background: white; border: 1.5px solid var(--color-border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1.5rem; }
    @media (min-width: 640px) { .checkout-card { padding: 1.5rem; } }

    .addr-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    @media (min-width: 640px) { .addr-grid { grid-template-columns: 1fr 1fr; } }

    .addr-item { padding: 1rem; border: 2px solid var(--color-border); border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s; }
    .addr-item:hover { border-color: var(--color-accent); }
    .addr-item.selected { border-color: var(--color-accent); background: rgba(37,99,235,0.03); }

    .form-row { display: grid; grid-template-columns: 1fr; gap: 1rem; }
    @media (min-width: 480px) { .form-row { grid-template-columns: 1fr 1fr; } }

    .summary-sticky { position: sticky; top: 5rem; height: fit-content; }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="container section">
    <h1 style="margin-bottom: 1.5rem; font-size: clamp(1.25rem, 4vw, 1.75rem);">Checkout</h1>
    
    <div class="checkout-layout">
      
      <!-- Delivery Details -->
      <div>
        <div class="checkout-card">
          <h2 style="font-size: 1.1rem; margin-bottom: 1.25rem;">Delivery Address</h2>
          <div id="address-list" class="addr-grid" style="margin-bottom: 1rem;">
            Loading addresses...
          </div>
          
          <button class="btn btn-outline btn-sm" id="show-new-address-btn">+ Add New Address</button>
          
          <div id="new-address-form" style="display: none; margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--color-border);">
            <h3 style="font-size: 1rem; margin-bottom: 1rem;">New Address</h3>
            <form id="address-form">
              <div class="form-row" style="margin-bottom: 1rem;">
                <div class="form-group"><label class="form-label">Name</label><input type="text" id="addr-name" class="form-control" required></div>
                <div class="form-group"><label class="form-label">Phone</label><input type="text" id="addr-phone" class="form-control" required></div>
              </div>
              <div class="form-group"><label class="form-label">Address Line 1</label><input type="text" id="addr-line1" class="form-control" required></div>
              <div class="form-group"><label class="form-label">Address Line 2</label><input type="text" id="addr-line2" class="form-control"></div>
              <div class="form-row" style="margin-bottom: 1rem;">
                <div class="form-group"><label class="form-label">City</label><input type="text" id="addr-city" class="form-control" required></div>
                <div class="form-group"><label class="form-label">State</label><input type="text" id="addr-state" class="form-control" required></div>
              </div>
              <div class="form-group"><label class="form-label">Pincode</label><input type="text" id="addr-pincode" class="form-control" required style="max-width: 200px;"></div>
              <button type="submit" class="btn btn-primary mt-2">Save Address</button>
            </form>
          </div>
        </div>
      </div>

      <!-- Order Summary -->
      <div>
        <div class="checkout-card summary-sticky">
          <h3 style="font-size: 1.1rem; margin-bottom: 1rem;">Order Summary</h3>
          <div id="checkout-items" style="margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--color-border);"></div>
          
          <div class="d-flex justify-between mb-2" style="font-size: 0.9rem;">
            <span class="text-muted">Subtotal</span>
            <span class="fw-bold" id="summary-subtotal">₹0</span>
          </div>
          <div class="d-flex justify-between mb-2" style="font-size: 0.9rem;">
            <span class="text-muted">Shipping</span>
            <span class="fw-bold" id="summary-shipping">₹0</span>
          </div>
          <div class="d-flex justify-between mb-4" style="font-size: 0.9rem;">
            <span class="text-muted text-success" id="summary-discount-label" style="display:none;">Discount</span>
            <span class="fw-bold text-success" id="summary-discount" style="display:none;">-₹0</span>
          </div>
          
          <div class="form-group d-flex gap-2 mb-4" style="flex-wrap: wrap;">
            <input type="text" id="coupon-code" class="form-control" placeholder="Coupon Code" style="flex: 1; min-width: 120px;">
            <button class="btn btn-outline" id="apply-coupon-btn" style="white-space: nowrap;">Apply</button>
          </div>

          <div class="d-flex justify-between mb-4" style="padding-top: 1rem; border-top: 1px solid var(--color-border);">
            <span class="fw-bold" style="font-size: 1.15rem;">Total</span>
            <span class="fw-bold" id="summary-total" style="font-size: 1.15rem; color: var(--color-accent);">₹0</span>
          </div>
          <button class="btn btn-primary btn-block" id="pay-now-btn" style="font-size: 1rem; padding: 0.9rem;">Pay Now</button>
        </div>
      </div>
      
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module">
    import { HEADER_HTML, FOOTER_HTML, BOTTOM_NAV_HTML, initPage } from './js/header.js';
    import { supabase } from './js/supabase.js';
    import { requireAuth, getCurrentUser } from './js/auth.js';
    import { getCart, getCartTotal } from './js/cart.js';
    import { processCheckout } from './js/checkout.js';
    import { showToast } from './js/toast.js';

    document.getElementById('header-placeholder').innerHTML = HEADER_HTML;
    document.getElementById('footer-placeholder').innerHTML = FOOTER_HTML;
    document.body.insertAdjacentHTML('beforeend', BOTTOM_NAV_HTML);

    let addresses = [];
    let selectedAddressId = null;
    let couponData = null;
    let settings = {};

    async function init() {
      await initPage();
      requireAuth();
      
      const cart = getCart();
      if (cart.length === 0) {
        window.location.href = './cart.html';
        return;
      }

      // Load settings
      const { data: s } = await supabase.from('settings').select('*');
      if (s) {
        s.forEach(row => settings[row.key] = row.value);
      }

      await loadAddresses();
      renderOrderSummary();

      document.getElementById('show-new-address-btn').addEventListener('click', () => {
        document.getElementById('new-address-form').style.display = 'block';
        document.getElementById('show-new-address-btn').style.display = 'none';
      });

      document.getElementById('address-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user = getCurrentUser();
        const newAddr = {
          user_id: user.id,
          name: document.getElementById('addr-name').value,
          line1: document.getElementById('addr-line1').value,
          line2: document.getElementById('addr-line2').value,
          city: document.getElementById('addr-city').value,
          state: document.getElementById('addr-state').value,
          pincode: document.getElementById('addr-pincode').value,
          phone: document.getElementById('addr-phone').value,
        };

        const { data, error } = await supabase.from('addresses').insert([newAddr]).select();
        if (!error && data) {
          showToast('Address saved', 'success');
          document.getElementById('address-form').reset();
          document.getElementById('new-address-form').style.display = 'none';
          document.getElementById('show-new-address-btn').style.display = 'block';
          await loadAddresses();
        } else {
          showToast('Failed to save address', 'error');
        }
      });

      document.getElementById('pay-now-btn').addEventListener('click', handlePayNow);
      document.getElementById('apply-coupon-btn').addEventListener('click', handleCoupon);
    }

    async function loadAddresses() {
      const user = getCurrentUser();
      const { data } = await supabase.from('addresses').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
      addresses = data || [];
      
      const container = document.getElementById('address-list');
      if (addresses.length === 0) {
        container.innerHTML = '<p class="text-muted">No saved addresses.</p>';
        document.getElementById('show-new-address-btn').click();
      } else {
        selectedAddressId = addresses[0].id;
        container.innerHTML = addresses.map(a => `
          <div class="addr-item ${a.id === selectedAddressId ? 'selected' : ''}" 
               onclick="window.selectAddress('${a.id}')" id="addr-card-${a.id}">
            <div class="fw-bold" style="margin-bottom: 0.35rem;">${a.name}</div>
            <div class="text-muted" style="font-size: 0.85rem; line-height: 1.5;">${a.line1}${a.line2 ? ', ' + a.line2 : ''}<br>${a.city}, ${a.state} ${a.pincode}<br>📞 ${a.phone}</div>
          </div>
        `).join('');
      }
    }

    window.selectAddress = function(id) {
      selectedAddressId = id;
      document.querySelectorAll('.addr-item').forEach(el => el.classList.remove('selected'));
      const card = document.getElementById(`addr-card-${id}`);
      if (card) card.classList.add('selected');
    }

    function renderOrderSummary() {
      const cart = getCart();
      const subtotal = getCartTotal();
      
      document.getElementById('checkout-items').innerHTML = cart.map(item => `
        <div class="d-flex justify-between mb-2" style="gap: 0.5rem;">
          <span style="font-size:0.85rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.quantity}× ${item.name} ${item.variant_label ? `(${item.variant_label})` : ''}</span>
          <span class="fw-bold" style="font-size: 0.85rem; flex-shrink: 0;">₹${item.price * item.quantity}</span>
        </div>
      `).join('');

      document.getElementById('summary-subtotal').textContent = `₹${subtotal}`;
      
      let discount = 0;
      if (couponData) {
        document.getElementById('summary-discount-label').style.display = 'block';
        document.getElementById('summary-discount-label').textContent = `Discount (${couponData.code})`;
        document.getElementById('summary-discount').style.display = 'block';
        
        if (couponData.discount_type === 'percent') {
          discount = (subtotal * couponData.discount_value) / 100;
        } else {
          discount = couponData.discount_value;
        }
        document.getElementById('summary-discount').textContent = `-₹${discount}`;
      }

      const shippingThreshold = parseFloat(settings['free_shipping_threshold'] || '499');
      const flatCharge = parseFloat(settings['flat_shipping_charge'] || '49');
      const finalSubtotal = subtotal - discount;
      
      const shipping = finalSubtotal >= shippingThreshold ? 0 : flatCharge;
      document.getElementById('summary-shipping').textContent = shipping === 0 ? 'FREE' : `₹${shipping}`;
      
      const total = finalSubtotal + shipping;
      document.getElementById('summary-total').textContent = `₹${total}`;
    }

    async function handleCoupon() {
      const code = document.getElementById('coupon-code').value.trim();
      if (!code) return;
      
      const { data, error } = await supabase.from('coupons').select('*').eq('code', code).eq('is_active', true).single();
      
      if (error || !data) {
        showToast('Invalid or expired coupon', 'error');
        return;
      }
      
      const subtotal = getCartTotal();
      if (subtotal < data.min_order) {
        showToast(`Minimum order of ₹${data.min_order} required for this coupon`, 'error');
        return;
      }
      
      if (data.expires_at && new Date(data.expires_at) < new Date()) {
        showToast('Coupon has expired', 'error');
        return;
      }

      if (data.max_uses && data.used_count >= data.max_uses) {
         showToast('Coupon usage limit reached', 'error');
         return;
      }

      couponData = data;
      showToast('Coupon applied', 'success');
      renderOrderSummary();
    }

    async function handlePayNow() {
      if (!selectedAddressId) {
        showToast('Please select a delivery address', 'error');
        return;
      }
      
      const addr = addresses.find(a => a.id === selectedAddressId);
      const cart = getCart();
      
      const orderData = {
        shipping_address: addr,
        items: cart
      };
      
      document.getElementById('pay-now-btn').disabled = true;
      document.getElementById('pay-now-btn').textContent = 'Processing...';
      
      await processCheckout(orderData, couponData);
      
      document.getElementById('pay-now-btn').disabled = false;
      document.getElementById('pay-now-btn').textContent = 'Pay Now';
    }

    init();
  </script>
</body>
</html>
