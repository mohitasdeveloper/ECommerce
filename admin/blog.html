<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Blog - Admin</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/admin.css">
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="admin-logo">Admin Panel</div>
      <nav class="admin-nav">
        <a href="index.html">Dashboard</a>
        <a href="products.html">Products</a>
        <a href="orders.html">Orders</a>
        <a href="coupons.html">Coupons</a>
        <a href="reviews.html">Reviews</a>
        <a href="blog.html" class="active">Blog</a>
        <a href="settings.html">Settings</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h1 style="font-size: 1.25rem; margin: 0;">Blog Posts</h1>
        <button id="add-post-btn" class="btn btn-primary btn-sm">+ Add Post</button>
      </header>

      <div class="admin-content">
        <div class="table-container">
          <table style="width: 100%;">
            <thead>
              <tr>
                <th>Post</th>
                <th>Published At</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="posts-tbody">
              <tr><td colspan="4">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Post Modal -->
  <div class="modal-overlay" id="post-modal">
    <div class="modal-content" style="max-width: 800px;">
      <div class="d-flex justify-between align-center mb-4">
        <h2 id="modal-title">Add Blog Post</h2>
        <button type="button" id="close-modal-btn" class="btn">✕</button>
      </div>
      <form id="post-form">
        <input type="hidden" id="post-id">
        
        <div class="form-group">
          <label class="form-label">Title</label>
          <input type="text" id="post-title" class="form-control" required>
        </div>

        <div class="form-group">
          <label class="form-label">Slug</label>
          <input type="text" id="post-slug" class="form-control" required>
        </div>

        <div class="form-group">
          <label class="form-label">Excerpt</label>
          <textarea id="post-excerpt" class="form-control" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Content (HTML allowed)</label>
          <textarea id="post-content" class="form-control" rows="10" required></textarea>
        </div>

        <div class="form-group mb-4 pb-4" style="border-bottom: 1px solid var(--color-border);">
          <label class="form-label">Cover Image</label>
          <div class="d-flex align-center gap-4">
            <button type="button" class="btn btn-outline btn-sm" id="upload-image-btn">Upload Image</button>
            <input type="hidden" id="post-image-url">
            <img id="image-preview" src="" style="display:none; width:120px; height:80px; object-fit:cover; border-radius:var(--radius-sm);">
            <button type="button" class="btn btn-danger btn-sm" id="remove-image-btn" style="display:none;">Remove</button>
          </div>
        </div>

        <div class="form-group mb-4">
          <label class="d-flex align-center gap-2">
            <span class="toggle"><input type="checkbox" id="post-published"><span class="toggle-slider"></span></span>
            Publish Immediately
          </label>
        </div>

        <button type="submit" class="btn btn-primary">Save Post</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { initAuth } from '../js/auth.js';
    import { checkAdmin } from '../js/admin.js';
    import { supabase } from '../js/supabase.js';
    import { showToast } from '../js/toast.js';
    import { openUploadWidget } from '../js/cloudinary.js';

    async function init() {
      await initAuth();
      await checkAdmin();
      await loadPosts();

      document.getElementById('add-post-btn').addEventListener('click', () => {
        document.getElementById('post-form').reset();
        document.getElementById('post-id').value = '';
        document.getElementById('post-image-url').value = '';
        document.getElementById('image-preview').style.display = 'none';
        document.getElementById('remove-image-btn').style.display = 'none';
        document.getElementById('modal-title').textContent = 'Add Blog Post';
        document.getElementById('post-modal').classList.add('active');
      });

      document.getElementById('close-modal-btn').addEventListener('click', () => {
        document.getElementById('post-modal').classList.remove('active');
      });

      document.getElementById('post-title').addEventListener('input', (e) => {
        if (!document.getElementById('post-id').value) {
          const slug = e.target.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
          document.getElementById('post-slug').value = slug;
        }
      });

      document.getElementById('upload-image-btn').addEventListener('click', () => {
        openUploadWidget({ maxFiles: 1 }, (result) => {
          document.getElementById('post-image-url').value = result.url;
          document.getElementById('image-preview').src = result.url;
          document.getElementById('image-preview').style.display = 'block';
          document.getElementById('remove-image-btn').style.display = 'block';
        });
      });

      document.getElementById('remove-image-btn').addEventListener('click', () => {
        document.getElementById('post-image-url').value = '';
        document.getElementById('image-preview').style.display = 'none';
        document.getElementById('remove-image-btn').style.display = 'none';
      });

      document.getElementById('post-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('post-id').value;
        const title = document.getElementById('post-title').value;
        const slug = document.getElementById('post-slug').value;
        const excerpt = document.getElementById('post-excerpt').value;
        const content = document.getElementById('post-content').value;
        const imageUrl = document.getElementById('post-image-url').value;
        const published = document.getElementById('post-published').checked;
        
        const { data: { user } } = await supabase.auth.getUser();

        const postData = {
          title, slug, excerpt, content, 
          image_url: imageUrl || null,
          is_published: published,
          author_id: user.id
        };

        if (published) {
          postData.published_at = new Date().toISOString();
        }

        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = 'Saving...';

        try {
          if (id) {
            const { error } = await supabase.from('blog_posts').update(postData).eq('id', id);
            if (error) throw error;
          } else {
            const { error } = await supabase.from('blog_posts').insert([postData]);
            if (error) throw error;
          }
          showToast('Post saved successfully', 'success');
          document.getElementById('post-modal').classList.remove('active');
          loadPosts();
        } catch (error) {
          showToast(error.message, 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Save Post';
        }
      });
    }

    async function loadPosts() {
      const { data } = await supabase.from('blog_posts').select('*').order('created_at', { ascending: false });
      const tbody = document.getElementById('posts-tbody');
      
      if (!data || data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4">No posts found.</td></tr>';
        return;
      }

      tbody.innerHTML = data.map(p => `
        <tr>
          <td>
            <div class="d-flex align-center gap-2">
              ${p.image_url ? `<img src="${p.image_url}" style="width:50px;height:35px;object-fit:cover;border-radius:4px;">` : ''}
              <div>
                <div class="fw-bold">${p.title}</div>
                <div class="text-muted text-sm">${p.slug}</div>
              </div>
            </div>
          </td>
          <td>${p.published_at ? new Date(p.published_at).toLocaleDateString() : '-'}</td>
          <td>
            <span class="badge-stock ${p.is_published ? 'in-stock' : 'out-of-stock'}">${p.is_published ? 'Published' : 'Draft'}</span>
          </td>
          <td>
            <div style="display:flex;gap:0.5rem;">
              <button class="btn btn-outline btn-sm" onclick="window.editPost('${p.id}')">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="window.deletePost('${p.id}')">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    window.editPost = async function(id) {
      const { data: p } = await supabase.from('blog_posts').select('*').eq('id', id).single();
      if (!p) return;

      document.getElementById('post-id').value = p.id;
      document.getElementById('post-title').value = p.title;
      document.getElementById('post-slug').value = p.slug;
      document.getElementById('post-excerpt').value = p.excerpt || '';
      document.getElementById('post-content').value = p.content || '';
      
      if (p.image_url) {
        document.getElementById('post-image-url').value = p.image_url;
        document.getElementById('image-preview').src = p.image_url;
        document.getElementById('image-preview').style.display = 'block';
        document.getElementById('remove-image-btn').style.display = 'block';
      } else {
        document.getElementById('post-image-url').value = '';
        document.getElementById('image-preview').style.display = 'none';
        document.getElementById('remove-image-btn').style.display = 'none';
      }
      
      document.getElementById('post-published').checked = p.is_published;

      document.getElementById('modal-title').textContent = 'Edit Blog Post';
      document.getElementById('post-modal').classList.add('active');
    }

    window.deletePost = async function(id) {
      if (!confirm('Are you sure you want to delete this post?')) return;
      const { error } = await supabase.from('blog_posts').delete().eq('id', id);
      if (error) { showToast('Error deleting post', 'error'); return; }
      showToast('Post deleted', 'success');
      loadPosts();
    }

    init();
  </script>
</body>
</html>
