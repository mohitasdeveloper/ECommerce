<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Blog - My Store</title>
  <link rel="stylesheet" href="./css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .blog-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; }
    @media (min-width: 768px) { .blog-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .blog-grid { grid-template-columns: repeat(3, 1fr); } }
    
    .blog-card { border-radius: var(--radius-lg); overflow: hidden; background: white; border: 1.5px solid var(--color-border); transition: transform 0.25s, box-shadow 0.25s; }
    @media (min-width: 768px) { .blog-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); } }
    .blog-card-img { aspect-ratio: 16/9; background: var(--color-bg-secondary); overflow: hidden; }
    .blog-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    @media (min-width: 768px) { .blog-card:hover .blog-card-img img { transform: scale(1.04); } }
    .blog-card-content { padding: 1.5rem; }
    .blog-date { font-size: 0.8rem; color: var(--color-text-muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .blog-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.75rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .blog-excerpt { font-size: 0.95rem; color: var(--color-text-muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 1.5rem; }
    .blog-read-more { font-weight: 600; color: var(--color-accent); font-size: 0.9rem; }
    .blog-read-more:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="container section">
    <div style="text-align: center; margin-bottom: 3rem;">
      <h1 style="margin-bottom: 1rem;">Our Blog</h1>
      <p class="text-muted" style="font-size: 1.1rem; max-width: 600px; margin: 0 auto;">Read our latest articles, guides, and updates.</p>
    </div>

    <div class="blog-grid" id="blog-grid">
      <!-- Skeletons -->
      <div class="blog-card skeleton" style="height: 400px;"></div>
      <div class="blog-card skeleton" style="height: 400px;"></div>
      <div class="blog-card skeleton" style="height: 400px;"></div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script type="module">
    import { HEADER_HTML, FOOTER_HTML, BOTTOM_NAV_HTML, initPage } from './js/header.js';
    import { supabase } from './js/supabase.js';
    
    document.getElementById('header-placeholder').innerHTML = HEADER_HTML;
    document.getElementById('footer-placeholder').innerHTML = FOOTER_HTML;
    document.body.insertAdjacentHTML('beforeend', BOTTOM_NAV_HTML);

    async function init() {
      await initPage();
      
      const { data: posts } = await supabase
        .from('blog_posts')
        .select('*')
        .eq('is_published', true)
        .order('published_at', { ascending: false });
        
      const grid = document.getElementById('blog-grid');
      
      if (!posts || posts.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 4rem 0;"><p class="text-muted" style="font-size: 1.1rem;">No blog posts available at the moment.</p></div>';
        return;
      }
      
      grid.innerHTML = posts.map(post => `
        <article class="blog-card">
          <a href="./blog-post.html?slug=${post.slug}" style="display: block;">
            <div class="blog-card-img">
              <img src="${post.image_url || 'https://images.unsplash.com/photo-1499951360447-b19be8fe80f5?w=800&auto=format&fit=crop'}" alt="${post.title}" loading="lazy">
            </div>
            <div class="blog-card-content">
              <div class="blog-date">${new Date(post.published_at || post.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
              <h2 class="blog-title">${post.title}</h2>
              <div class="blog-excerpt">${post.excerpt || ''}</div>
              <span class="blog-read-more">Read Full Article →</span>
            </div>
          </a>
        </article>
      `).join('');
    }
    
    init();
  </script>
</body>
</html>
